### ROS_workspace/localization/config/ekf.yaml
ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    two_d_mode: true
    publish_acceleration: false
    print_diagnostics: true

    # Coordinate frames
    map_frame: map              # The global frame
    odom_frame: odom            # The local odometry frame
    base_link_frame: base_link  # The robot's center coordinate frame
    world_frame: odom           # Set to odom for local filtering, map for AMCL fusion

    # Sensor 1: Wheel Odometry (from your simulation engine)
    odom0: /odom
    odom0_config: [true,  true,  false,  # x, y, z
                   false, false, true,   # roll, pitch, yaw
                   true,  true,  false,  # x_vel, y_vel, z_vel
                   false, false, true,   # roll_vel, pitch_vel, yaw_vel
                   false, false, false]  # accelerations
    odom0_differential: false
    odom0_relative: false

    # Sensor 2: IMU
    imu0: /imu/data
    imu0_config: [false, false, false,  # x, y, z
                  false, false, true,   # roll, pitch, yaw (yaw is critical)
                  false, false, false,  # x_vel, y_vel, z_vel
                  false, false, true,   # roll_vel, pitch_vel, yaw_vel
                  true,  true,  false]  # x_accel, y_accel, z_accel
    imu0_differential: false
    imu0_relative: true
    imu0_queue_size: 10