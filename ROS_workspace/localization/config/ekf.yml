ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    two_d_mode: true
    publish_acceleration: false
    print_diagnostics: true

    # Coordinate frames
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint 
    world_frame: odom

    # Sensor 1: Wheel Odometry
    odom0: /odom
    odom0_config: [true,  true,  false,  # x, y, z
                   false, false, true,   # roll, pitch, yaw
                   true,  true,  false,  # x_vel, y_vel, z_vel
                   false, false, true,   # roll_vel, pitch_vel, yaw_vel
                   false, false, false]  # accelerations
    odom0_differential: false
    odom0_relative: false

    # Sensor 2: IMU
    # NOTE: Make sure your simulation actually outputs to /imu/data. 
    # If it outputs to just /imu, change this line to match!
    imu0: /imu/data
    imu0_config: [false, false, false,  # x, y, z
                  false, false, true,   # roll, pitch, yaw
                  false, false, false,  # x_vel, y_vel, z_vel
                  false, false, true,   # roll_vel, pitch_vel, yaw_vel
                  true,  true,  false]  # x_accel, y_accel, z_accel
    imu0_differential: false
    imu0_relative: true
    imu0_queue_size: 10